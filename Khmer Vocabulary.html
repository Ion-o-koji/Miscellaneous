<!-- Version check + robust asset fallback.
     - If opened as file:// attempt local version.txt first
     - Try CDN first, then raw.githubusercontent fallback
     - Non-blocking: if all fail, continue rendering but log diagnostics
-->
<script>
(function(){
  const VERSION_CDN = 'https://cdn.jsdelivr.net/gh/Ion-o-koji/Miscellaneous@main/version.txt';
  const VERSION_RAW = 'https://raw.githubusercontent.com/Ion-o-koji/Miscellaneous/main/version.txt';
  const LOCAL_VERSION = './version.txt';
  const STORAGE_KEY = 'kv_app_version';

  function fetchWithTimeout(url, timeout = 8000) {
    return new Promise((resolve, reject) => {
      const controller = new AbortController();
      const id = setTimeout(() => {
        controller.abort();
        reject(new Error('timeout'));
      }, timeout);

      fetch(url, { cache: 'no-store', signal: controller.signal })
        .then(r => {
          clearTimeout(id);
          if (!r.ok) return reject(new Error('HTTP ' + r.status));
          return r.text().then(t => resolve(t));
        })
        .catch(err => {
          clearTimeout(id);
          reject(err);
        });
    });
  }

  async function checkVersion() {
    try {
      let text = null;
      if (location.protocol === 'file:') {
        console.warn('Serving via file:// — trying local version.txt first (some fetches may be blocked).');
        text = await fetchWithTimeout(LOCAL_VERSION, 3000).catch(()=>null);
      }
      if (text == null) {
        // try CDN first
        text = await fetchWithTimeout(VERSION_CDN, 5000).catch(async (err) => {
          console.warn('CDN fetch failed, trying raw.githubusercontent:', err);
          // fallback to raw GitHub
          return await fetchWithTimeout(VERSION_RAW, 5000).catch(e => {
            console.warn('Raw GitHub fetch failed', e);
            return null;
          });
        });
      }
      if (text) {
        text = text.trim();
        console.info('App version:', text);
        try { localStorage.setItem(STORAGE_KEY, text); } catch(e) { /* ignore */ }
      } else {
        console.warn('Could not fetch version.txt; continuing without version check');
      }
    } catch (e) {
      console.error('Version check failed:', e);
    }
  }

  // Run version check but do not block rendering
  checkVersion();
})();
</script>
